name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: 🛒 Checkout
        uses: actions/checkout@v4

      - name: 🫓 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: |
          bun install --frozen-lockfile

      - name: 🔧 Prepare Nuxt types
        run: |
          bun run nuxi prepare

      - name: 🏗️ Build
        run: |
          bun run nuxi build

      - name: ✅ Typecheck
        run: |
          bun run typecheck

      - name: 🧪 Run tests
        run: |
          bun run test:ci
