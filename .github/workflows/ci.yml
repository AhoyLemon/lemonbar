name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
      - name: Prepare Nuxt types
        run: |
          bun run nuxi prepare
      - name: Build
        run: |
          bun run nuxi build
      - name: Typecheck
        run: |
          bun run typecheck
      - name: Run tests
        run: |
          bun run test:ci
